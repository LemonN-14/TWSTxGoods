<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWSTxGoods - Stock Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <!-- ไอคอนล็อกอินมุมซ้ายบน นอกกรอบ (ไม่เลื่อนตามจอ) -->
    <div id="floatingAuth" class="floating-auth">
        <button id="authIconBtn" class="auth-icon-btn" title="บัญชีผู้ใช้">
            <i class="fas fa-user-circle" id="authIconDefault"></i>
            <img id="authIconImage" src="" alt="User" class="hidden">
        </button>
        
        <!-- เมนูดรอปดาวน์เมื่อคลิกไอคอน -->
        <div id="authDropdown" class="auth-dropdown hidden">
            <p id="userNameDisplay">Name</p>
            <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
        </div>
    </div>

    <!-- กรอบแอปพลิเคชัน (แสดงตลอดเวลา) -->
    <div class="container" id="appContainer">
        
        <!-- ส่วนที่ล็อกอยู่ด้านบนเวลาเลื่อนจอ (Sticky Area) -->
        <div class="sticky-top-area">
            <div class="header">
                <!-- Wrapper รวมปุ่มล็อกอินมือถือ + ชื่อแอป -->
                <div class="header-title-wrapper">
                    <button id="mobileAuthBtn" class="header-btn mobile-auth-btn" title="เข้าสู่ระบบ/ออกจากระบบ">
                        <!-- เปลี่ยนเป็นไอคอนคน -->
                        <i class="fas fa-user"></i>
                    </button>
                    <h1>TWSTxGoods</h1>
                </div>
                <div class="header-actions">
                    <button id="themeToggleBtn" class="header-btn theme-btn" title="สลับธีม"><i class="fas fa-sun"></i></button>
                    <button id="deleteSelectedBtn" class="header-btn delete-btn hidden auth-required" title="ลบที่เลือก"><i class="fas fa-trash-alt"></i></button>
                    <button id="editModeBtn" class="header-btn edit-btn auth-required hidden" title="โหมดแก้ไข"><i class="fas fa-pencil-alt"></i></button>
                    <button id="addButton" class="add-btn auth-required hidden" title="เพิ่มรายการ">+</button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ค้นหาชื่อ หรือ ประเภท...">
                <select id="categoryFilter">
                    <option value="all">ทุกประเภท</option>
                </select>
                <button id="sortBtn" class="header-btn sort-btn" title="เรียงตามชื่อ"><i class="fas fa-sort-alpha-down"></i></button>
            </div>
        </div>
        <!-- จบส่วน Sticky -->

        <!-- เพิ่ม div ครอบตารางเพื่อให้เลื่อนซ้ายขวาได้ ไม่บีบข้อความ -->
        <div class="table-responsive">
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th class="checkbox-col auth-required hidden">เลือก</th>
                        <th>รูปสินค้า</th>
                        <th>รายการ</th>
                        <th>ประเภท</th>
                        <th>จำนวนชิ้น</th>
                        <th>ราคา (บาท)</th>
                        <th>หมายเหตุ</th>
                        <th class="action-col auth-required hidden">แก้ไข</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content text-center">
            <span class="close-button">&times;</span>
            <h2 style="margin-top: 0;">เข้าสู่ระบบ</h2>
            <p style="margin-bottom: 25px; color: var(--text-color); opacity: 0.8;">กรุณาเชื่อมต่อบัญชี Google เพื่อจัดการสต็อกสินค้าของคุณ</p>
            <button id="googleLoginBtn" class="google-login-btn center-block">
                <i class="fab fa-google"></i> เชื่อมต่อ Google
            </button>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalTitle">เพิ่มรายการ</h2>
            <form id="productForm">
                <label for="imageUrl">URL รูปสินค้า (ถ้ามี):</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
                <label for="imageFile">หรือ อัปโหลดรูปภาพ:</label>
                <input type="file" id="imageFile" accept="image/*">
                <div id="uploadProgress" class="hidden" style="margin-top:5px; font-size:14px; color:#007bff;">กำลังประมวลผลรูปภาพ...</div>
                <div id="removeImageContainer" class="hidden">
                    <button type="button" id="removeImageBtn" class="remove-image-btn">ลบรูปภาพปัจจุบัน</button>
                </div>
                <label for="productName">รายการ:</label>
                <input type="text" id="productName" required>
                <label for="category">ประเภท:</label>
                <input type="text" id="category">
                <label for="quantity">จำนวนชิ้น:</label>
                <input type="number" id="quantity">
                <label for="price">ราคา (บาท):</label>
                <input type="text" id="price">
                <label for="note">หมายเหตุ:</label>
                <input type="text" id="note" placeholder="ข้อมูลเพิ่มเติม...">
                <button type="submit" class="save-btn" id="saveProductBtn">บันทึก</button>
            </form>
        </div>
    </div>
    
    <div id="confirmModal" class="modal">
        <div class="modal-content confirm-modal-content">
            <h2 id="confirmTitle">ยืนยันการลบ</h2>
            <p id="confirmMessage">คุณแน่ใจหรือไม่ว่าต้องการลบรายการที่เลือก?</p>
            <div class="confirm-actions">
                <button id="confirmCancelBtn" class="confirm-btn cancel-btn">ยกเลิก</button>
                <button id="confirmDeleteBtn" class="confirm-btn delete-confirm-btn">ยืนยัน</button>
            </div>
        </div>
    </div>
    
    <div id="imageModal" class="modal image-viewer-modal">
        <div class="image-modal-content">
            <img id="modalImage" src="" alt="Full size product image">
        </div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>
</html>
