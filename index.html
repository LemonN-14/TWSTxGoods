<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWSTxGoods - Stock Manager</title>

    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-mode">

    <!-- Main Container -->
    <div class="container">
        
        <!-- ======================= Header Section ======================= -->
        <div class="header">
            <h1>TWSTxGoods</h1>
            <div class="header-actions">
                <button id="themeToggleBtn" class="header-btn theme-btn" title="สลับธีม"><i class="fas fa-sun"></i></button>
                <button id="deleteSelectedBtn" class="header-btn delete-btn hidden" title="ลบที่เลือก"><i class="fas fa-trash-alt"></i></button>
                <button id="editModeBtn" class="header-btn edit-btn" title="โหมดแก้ไข"><i class="fas fa-pencil-alt"></i></button>
                <button id="addButton" class="add-btn" title="เพิ่มสินค้า">+</button>
            </div>
        </div>
        
        <!-- =================== Search and Filter Section ================== -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อ หรือ ประเภท...">
            <select id="categoryFilter">
                <option value="all">ทุกประเภท</option>
            </select>
            <button id="sortBtn" class="header-btn sort-btn" title="เรียงตามชื่อ"><i class="fas fa-sort-alpha-down"></i></button>
        </div>

        <!-- ===================== Inventory Table ====================== -->
        <table id="inventoryTable">
            <thead>
                <tr>
                    <th class="checkbox-col">เลือก</th>
                    <th>รูปสินค้า</th>
                    <th>ชื่อสินค้า</th>
                    <th>ประเภท</th>
                    <th>จำนวนชิ้น</th>
                    <th>ราคา (บาท)</th>
                    <th class="action-col">แก้ไข</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <!-- Product rows are dynamically generated by JavaScript -->
            </tbody>
        </table>
    </div>

    <!-- ======================= Modals Section ======================= -->
    
    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalTitle">เพิ่มรายการสินค้า</h2>
            <form id="productForm">
                <label for="imageUrl">URL รูปสินค้า (ถ้ามี):</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
                
                <label for="imageFile">หรือ อัปโหลดรูปภาพ:</label>
                <input type="file" id="imageFile" accept="image/*">
                
                <div id="removeImageContainer" class="hidden">
                    <button type="button" id="removeImageBtn" class="remove-image-btn">ลบรูปภาพปัจจุบัน</button>
                </div>

                <label for="productName">ชื่อสินค้า:</label>
                <input type="text" id="productName" required>
                
                <label for="category">ประเภท:</label>
                <input type="text" id="category">
                
                <label for="quantity">จำนวนชิ้น:</label>
                <input type="number" id="quantity">
                
                <label for="price">ราคา (บาท):</label>
                <input type="text" id="price">
                
                <button type="submit" class="save-btn">บันทึก</button>
            </form>
        </div>
    </div>

    <!-- Confirm Deletion Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content confirm-modal-content">
            <h2 id="confirmTitle">ยืนยันการลบ</h2>
            <p id="confirmMessage">คุณแน่ใจหรือไม่ว่าต้องการลบรายการที่เลือก?</p>
            <div class="confirm-actions">
                <button id="confirmCancelBtn" class="confirm-btn cancel-btn">ยกเลิก</button>
                <button id="confirmDeleteBtn" class="confirm-btn delete-confirm-btn">ยืนยัน</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="imageModal" class="modal image-viewer-modal">
        <div class="image-modal-content">
            <img id="modalImage" src="" alt="Full size product image">
        </div>
    </div>

    <!-- ===================== JavaScript Libraries ===================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
